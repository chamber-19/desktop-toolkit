name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install kc_framework
        run: |
          cd python
          pip install -e .
      - name: Smoke-import every public module
        run: |
          python - <<'PY'
          import importlib
          mods = [
              "kc_framework",
              "kc_framework.utils.pdf_merge",
              "kc_framework.utils.email_sender",
          ]
          for m in mods:
              importlib.import_module(m)
              print(f"OK: {m}")
          PY
      - name: Verify pyinstaller spec template has no leftover transmittal references
        run: |
          ! grep -i "transmittal" python/kc_framework/pyinstaller/sidecar.spec.template

  js:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install JS package deps
        run: |
          cd js/packages/kc-framework
          # No package-lock yet for the framework itself; install peers manually for parse-check only
          npm install --no-save react react-dom @tauri-apps/api
      - name: Validate exports map (every declared subpath must exist)
        run: |
          cd js/packages/kc-framework
          node - <<'JS'
          const pkg = require("./package.json");
          const fs = require("node:fs");
          const path = require("node:path");
          let failed = false;
          for (const [subpath, target] of Object.entries(pkg.exports || {})) {
            const t = typeof target === "string" ? target : target.default || target.import;
            if (!t) continue;
            const abs = path.resolve(t);
            if (!fs.existsSync(abs)) {
              console.error(`MISSING: ${subpath} → ${t}`);
              failed = true;
            } else {
              console.log(`OK: ${subpath} → ${t}`);
            }
          }
          process.exit(failed ? 1 : 0);
          JS
      - name: Parse-check every JS/JSX entry
        run: |
          cd js/packages/kc-framework
          # --loader:.svg=text teaches esbuild to handle Vite-style SVG imports
          # (esbuild has no Vite plugin loader; this is the minimal CI adaptation)
          npx --yes esbuild \
            src/ipc/backend.js \
            src/utils/version.js \
            src/splash/index.jsx \
            src/updater/index.jsx \
            --bundle \
            --external:react \
            --external:react-dom \
            --external:@tauri-apps/api \
            --outdir=/tmp/kc-framework-check \
            --format=esm \
            --jsx=automatic \
            --loader:.svg=text

  tauri-template-render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Render templates with dummy values into a staging dir
        run: |
          set -euo pipefail
          STAGE=$(mktemp -d)
          cp -r tauri-template/src-tauri-base "$STAGE/src-tauri"
          cd "$STAGE/src-tauri"

          # Substitute every ${TOOL_*} / ${PRODUCT_NAME} placeholder with a dummy value
          # (must match the placeholder set documented in tauri-template/README.md)
          declare -A SUBS=(
            ["TOOL_NAME"]="ci-smoke-tool"
            ["TOOL_VERSION"]="0.0.0"
            ["TOOL_DESCRIPTION"]="CI smoke test tool"
            ["TOOL_AUTHORS"]="kc-framework CI"
            ["TOOL_PRODUCT_NAME"]="CI Smoke Tool"
            ["TOOL_IDENTIFIER"]="dev.kc-framework.ci-smoke"
            ["TOOL_SIDECAR_NAME"]="ci-smoke-backend"
          )

          for f in Cargo.toml.template tauri.conf.json.template; do
            if [ -f "$f" ]; then
              out="${f%.template}"
              cp "$f" "$out"
              for key in "${!SUBS[@]}"; do
                sed -i "s|\${${key}}|${SUBS[$key]}|g" "$out"
              done
              # Fail if any placeholder is left unsubstituted
              if grep -E '\$\{[A-Z_]+\}' "$out"; then
                echo "ERROR: unsubstituted placeholder in $out"
                exit 1
              fi
              rm "$f"
            fi
          done

          # Capabilities + Rust sources are copied as-is
          ls -la
          cargo check
          # Export staging dir for subsequent steps
          echo "TAURI_STAGE=$STAGE/src-tauri" >> "$GITHUB_ENV"
      - name: Cargo clippy on rendered template
        run: |
          cd "$TAURI_STAGE"
          cargo clippy --no-deps -- -D warnings || echo "::warning::clippy issued warnings; not failing CI in v1.0.x"

  workflow-template-yaml:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate release workflow template YAML
        run: |
          # Render all placeholders to dummy values so the YAML parses cleanly.
          # Actual placeholder names come from the comment block at the top of the template file.
          STAGE=$(mktemp)
          sed \
            -e 's|${TOOL_DISPLAY_NAME}|CI Smoke|g' \
            -e 's|${TOOL_VERSION_TAG_PREFIX}|v|g' \
            -e 's|${BACKEND_DIR}|backend|g' \
            -e 's|${BACKEND_SPEC}|ci-smoke.spec|g' \
            -e 's|${SIDECAR_NAME}|ci-smoke-backend|g' \
            -e 's|${FRONTEND_DIR}|frontend|g' \
            -e 's|${INSTALLER_GLOB}|frontend\\src-tauri\\target\\release\\bundle\\nsis\\*.exe|g' \
            .github/workflows/release-tauri-sidecar-app.yml.template > "$STAGE"
          python -c "
import yaml
with open('$STAGE') as fh:
    yaml.safe_load(fh)
print('OK: workflow template parses as valid YAML')
"

  install-script-syntax:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check on shell scripts
        run: |
          for f in $(find build-scripts -name "*.sh"); do
            bash -n "$f" && echo "OK: $f"
          done
      - name: Node syntax check on .mjs scripts
        run: |
          for f in $(find build-scripts -name "*.mjs"); do
            node --check "$f" && echo "OK: $f"
          done
      - name: PowerShell syntax check on .ps1 scripts
        run: |
          # PowerShell Core is preinstalled on ubuntu runners
          for f in $(find build-scripts -name "*.ps1"); do
            pwsh -NoProfile -Command "
              \$errors = \$null;
              [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw '$f'), [ref]\$errors) | Out-Null;
              if (\$errors.Count -gt 0) { \$errors; exit 1 } else { Write-Host 'OK: $f' }
            "
          done
