name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python/pyproject.toml
      - name: Install chamber19_desktop_toolkit
        run: |
          cd python
          pip install -e .
      - name: Smoke-import every public module
        run: |
          python - <<'PY'
          import importlib
          mods = [
              "chamber19_desktop_toolkit",
              "chamber19_desktop_toolkit.utils.pdf_merge",
              "chamber19_desktop_toolkit.utils.email_sender",
          ]
          for m in mods:
              importlib.import_module(m)
              print(f"OK: {m}")
          PY
      - name: Verify pyinstaller spec template has no leftover transmittal references
        run: |
          ! grep -i "transmittal" python/chamber19_desktop_toolkit/pyinstaller/sidecar.spec.template

  js:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install JS package deps
        run: |
          cd js/packages/desktop-toolkit
          npm install --no-save react react-dom @tauri-apps/api
      - name: Validate exports map (every declared subpath must exist)
        run: |
          cd js/packages/desktop-toolkit
          node - <<'JS'
          const pkg = require("./package.json");
          const fs = require("node:fs");
          const path = require("node:path");
          let failed = false;
          for (const [subpath, target] of Object.entries(pkg.exports || {})) {
            const t = typeof target === "string" ? target : target.default || target.import;
            if (!t) continue;
            const abs = path.resolve(t);
            if (!fs.existsSync(abs)) {
              console.error(`MISSING: ${subpath} -> ${t}`);
              failed = true;
            } else {
              console.log(`OK: ${subpath} -> ${t}`);
            }
          }
          process.exit(failed ? 1 : 0);
          JS
      - name: Parse-check every JS/JSX entry
        run: |
          cd js/packages/desktop-toolkit
          npx --yes esbuild \
            src/ipc/backend.js \
            src/utils/version.js \
            src/splash/index.jsx \
            src/updater/index.jsx \
            --bundle \
            --external:react \
            --external:react-dom \
            --external:@tauri-apps/api \
            --outdir=/tmp/desktop-toolkit-check \
            --format=esm \
            --jsx=automatic \
            --loader:.svg=text

  tauri-template-render:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Linux Tauri build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev
      - name: Render templates with dummy values into a staging dir
        run: |
          set -euo pipefail
          STAGE=$(mktemp -d)
          cp -r tauri-template/src-tauri-base "$STAGE/src-tauri"
          cd "$STAGE/src-tauri"

          declare -A SUBS=(
            ["TOOL_NAME"]="ci-smoke-tool"
            ["TOOL_VERSION"]="0.0.0"
            ["TOOL_DESCRIPTION"]="CI smoke test tool"
            ["TOOL_AUTHORS"]="chamber-19 CI"
            ["TOOL_PRODUCT_NAME"]="CI Smoke Tool"
            ["TOOL_IDENTIFIER"]="dev.chamber-19.ci-smoke"
            ["TOOL_SIDECAR_NAME"]="ci-smoke-backend"
          )

          for f in Cargo.toml.template tauri.conf.json.template; do
            if [ -f "$f" ]; then
              out="${f%.template}"
              cp "$f" "$out"
              for key in "${!SUBS[@]}"; do
                sed -i "s|\${${key}}|${SUBS[$key]}|g" "$out"
              done
              if grep -vE '^\s*(#|//)' "$out" | grep -E '\$\{[A-Z_]+\}'; then
                echo "ERROR: unsubstituted placeholder in $out"
                exit 1
              fi
              rm "$f"
            fi
          done

          ls -la

          # ── Override the template's desktop-toolkit git dep ───────────────
          # The template pins `desktop-toolkit = { git = "...", tag = "vX.Y.Z" }`
          # for downstream consumers, but in CI we want to validate the
          # CURRENT in-repo code, not a published tag (which may not exist
          # yet during the PR that publishes it — chicken-and-egg).
          #
          # Replace the entire `desktop-toolkit = { ... }` line with a path
          # dependency pointing at the in-repo crate. The GITHUB_WORKSPACE
          # env var holds the absolute path to the checked-out repo root.
          sed -i \
            "s|^desktop-toolkit = .*|desktop-toolkit = { path = \"${GITHUB_WORKSPACE}/crates/desktop-toolkit\" }|" \
            Cargo.toml
          echo "── Rendered Cargo.toml after path override ──"
          grep "^desktop-toolkit" Cargo.toml

          # Tauri validates externalBin paths AND bundle.resources globs at cargo
          # check time (file existence only). Create stubs for both:
          #   1. externalBin: binaries/ci-smoke-backend-<triple>
          #   2. bundle.resources: binaries/ci-smoke-backend/**/* (directory glob)
          mkdir -p binaries/ci-smoke-backend
          touch binaries/ci-smoke-backend-x86_64-unknown-linux-gnu
          touch binaries/ci-smoke-backend/.gitkeep

          # ── Stub icon and installer assets so cargo check passes ────────
          # Tauri validates `bundle.icon` and `bundle.windows.nsis.*` paths
          # at cargo check time (file existence only). Create the smallest
          # possible valid files for each referenced path.
          mkdir -p icons installer

          # 1×1 transparent PNG (67 bytes), base64-encoded.
          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=' \
            | base64 -d > icons/32x32.png
          cp icons/32x32.png icons/128x128.png
          cp icons/32x32.png 'icons/128x128@2x.png'

          # Minimal valid .ico file (PNG payload wrapped in ICO header).
          # tauri-build validates ICO format strictly, so use the bundled
          # `image` crate's behavior: a 1×1 BMP-format ICO is the smallest.
          # ICO header (6 bytes) + ICO directory entry (16 bytes) + 1×1 BMP
          # (40 bytes BITMAPINFOHEADER + 4 bytes XOR pixel data + 4 bytes
          # AND mask) = 70 bytes total.
          printf '\x00\x00\x01\x00\x01\x00\x01\x01\x00\x00\x01\x00\x20\x00\x30\x00\x00\x00\x16\x00\x00\x00\x28\x00\x00\x00\x01\x00\x00\x00\x02\x00\x00\x00\x01\x00\x20\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00' > icons/icon.ico

          # Installer asset stubs (NSIS-only; not validated by cargo check
          # but referenced by tauri.conf.json so paths must exist).
          touch installer/nsis-header.bmp
          touch installer/nsis-sidebar.bmp
          touch installer/hooks.nsh

          cargo check
          echo "TAURI_STAGE=$STAGE/src-tauri" >> "$GITHUB_ENV"
      - name: Cargo clippy on rendered template
        run: |
          cd "$TAURI_STAGE"
          cargo clippy --no-deps -- -D warnings || echo "::warning::clippy issued warnings; not failing CI in v1.0.x"

  workflow-template-yaml:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pyyaml
        run: pip install --quiet pyyaml
      - name: Validate release workflow template YAML
        run: |
          STAGE=$(mktemp)
          sed \
            -e 's|${TOOL_DISPLAY_NAME}|CI Smoke|g' \
            -e 's|${TOOL_VERSION_TAG_PREFIX}|v|g' \
            -e 's|${BACKEND_DIR}|backend|g' \
            -e 's|${BACKEND_SPEC}|ci-smoke.spec|g' \
            -e 's|${SIDECAR_NAME}|ci-smoke-backend|g' \
            -e 's|${FRONTEND_DIR}|frontend|g' \
            -e 's|${INSTALLER_GLOB}|frontend\\src-tauri\\target\\release\\bundle\\nsis\\*.exe|g' \
            .github/workflows/release-tauri-sidecar-app.yml.template > "$STAGE"
          STAGE_PATH="$STAGE" python - <<'PY'
          import os, yaml
          with open(os.environ["STAGE_PATH"]) as fh:
              yaml.safe_load(fh)
          print("OK: workflow template parses as valid YAML")
          PY

  fresh-consumer-install:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@chamber-19"

      - name: Wait for publish workflow to finish
        # The publish workflow runs on the same tag push; this job races it.
        # 90s is a comfortable buffer for a small package publish.
        run: sleep 90

      - name: Set up temp consumer project
        run: |
          TMPDIR=$(mktemp -d)
          echo "CONSUMER_DIR=$TMPDIR" >> "$GITHUB_ENV"

          cat > "$TMPDIR/package.json" <<'JSON'
          {
            "name": "consumer-smoke-test",
            "version": "0.0.1",
            "private": true,
            "type": "module"
          }
          JSON

          cat > "$TMPDIR/.npmrc" <<'NPMRC'
          @chamber-19:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          NPMRC

      - name: Install @chamber-19/desktop-toolkit at the published tag version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd "$CONSUMER_DIR"
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          npm install "@chamber-19/desktop-toolkit@$TAG_VERSION"

      - name: Verify all declared exports resolve in the installed package
        run: |
          cd "$CONSUMER_DIR"
          node --input-type=module <<'JS'
          import { resolve } from "node:path";
          import { existsSync, readFileSync } from "node:fs";

          const pkgPath = resolve("node_modules/@chamber-19/desktop-toolkit/package.json");
          const pkg = JSON.parse(readFileSync(pkgPath, "utf8"));

          let failed = false;
          for (const [subpath, target] of Object.entries(pkg.exports || {})) {
            const t = typeof target === "string" ? target : (target.default || target.import);
            if (!t) continue;
            const abs = resolve("node_modules/@chamber-19/desktop-toolkit", t);
            if (!existsSync(abs)) {
              console.error("MISSING:", subpath, "->", t);
              failed = true;
            } else {
              console.log("OK:", subpath, "->", t);
            }
          }
          if (failed) process.exit(1);
          JS

  install-script-syntax:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Bash syntax check on shell scripts
        run: |
          for f in $(find build-scripts -name "*.sh" 2>/dev/null); do
            bash -n "$f" && echo "OK: $f"
          done
      - name: Node syntax check on .mjs scripts
        run: |
          for f in $(find build-scripts -name "*.mjs" 2>/dev/null); do
            node --check "$f" && echo "OK: $f"
          done
      - name: PowerShell syntax check on .ps1 scripts
        run: |
          for f in $(find build-scripts -name "*.ps1" 2>/dev/null); do
            pwsh -NoProfile -Command "
              \$errors = \$null;
              [System.Management.Automation.PSParser]::Tokenize((Get-Content -Raw '$f'), [ref]\$errors) | Out-Null;
              if (\$errors.Count -gt 0) { \$errors; exit 1 } else { Write-Host 'OK: $f' }
            "
          done

  lockfile-integrity-guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Verify root JS package-lock matches package.json
        run: |
          # The DTK repo doesn't have a top-level lockfile we publish, but if
          # one exists we verify it. This job exists primarily as a template
          # consumer projects can mirror.
          if [ -f js/packages/desktop-toolkit/package-lock.json ]; then
            cd js/packages/desktop-toolkit
            # `npm ci --dry-run` succeeds only if every integrity hash in
            # the lockfile matches what the registry actually serves.
            npm ci --dry-run --ignore-scripts
          else
            echo "No lockfile present in js/packages/desktop-toolkit; skipping."
          fi
