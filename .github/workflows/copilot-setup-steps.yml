name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - js/packages/**
      - python/**
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - package.json
      - package-lock.json
      - Cargo.toml
      - Cargo.lock
      - crates/**
      - js/packages/**
      - python/**

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Node workspace deps
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          toolchain: "1.77.2"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            python/pyproject.toml
            python/chamber19_desktop_toolkit/pyinstaller/requirements-build.txt

      - name: Install Python package and build deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ./python
          pip install -r python/chamber19_desktop_toolkit/pyinstaller/requirements-build.txt

      - name: Verify toolchain
        run: |
          node --version
          npm --version
          cargo --version
          rustc --version
          python --version
